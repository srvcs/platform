name: build-service

on:
  workflow_call:
    inputs:
      image-name:
        required: true
        type: string
      publish:
        description: Request publish. Effective only on main/tags.
        required: false
        type: boolean
        default: false
      publish-preview:
        description: Publish a preview image tag for a trusted pull request.
        required: false
        type: boolean
        default: false
      preview-tag:
        description: Preview image tag to publish when publish-preview is true.
        required: false
        type: string
        default: ""

permissions:
  contents: read

jobs:
  check:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Validate service metadata is stamped
        run: |
          set -euo pipefail
          if grep -n "REPLACE-ME" flake.nix; then
            echo "::error file=flake.nix::Replace REPLACE-ME OCI label placeholders before using the shared service workflow."
            exit 1
          fi

      - uses: DeterminateSystems/nix-installer-action@v22

      - name: Flake check
        run: nix flake check -L

      - name: Format, lint, test
        run: |
          nix develop -c sh -euc '
            cargo fmt --check
            cargo clippy --all-targets -- -D warnings
            cargo test
          '

      - name: Validate OpenAPI is current
        run: nix develop -c cargo test --test openapi_snapshot

      - name: Build binary and image
        run: |
          nix build --fallback .#default -L
          nix build --fallback .#container -L --out-link oci-image
          cp -L oci-image image.tar.gz

      - name: Smoke-test operational endpoints
        run: |
          set -euo pipefail
          IMG=$(docker load -i image.tar.gz | sed -n 's/^Loaded image: //p' | head -1)
          cleanup() {
            docker logs svc || true
            docker rm -f svc || true
          }
          trap cleanup EXIT
          docker run -d --name svc -p 8080:8080 "$IMG"
          ready=0
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8080/healthz >/dev/null; then
              ready=1
              break
            fi
            sleep 1
          done
          test "$ready" = "1"
          for path in /readyz /metrics /openapi.json; do
            echo "smoke: ${path}"
            curl -fsS "http://localhost:8080${path}" >/dev/null
          done

      - name: Hand image to the publish job
        if: ${{ (inputs.publish && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))) || (inputs.publish-preview && inputs.preview-tag != '') }}
        uses: actions/upload-artifact@v7.0.1
        with:
          name: oci-image
          path: image.tar.gz
          retention-days: 1

  publish:
    needs: check
    if: ${{ (inputs.publish && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))) || (inputs.publish-preview && inputs.preview-tag != '') }}
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: DeterminateSystems/nix-installer-action@v22

      - name: Download image from check job
        uses: actions/download-artifact@v8.0.1
        with:
          name: oci-image

      - name: Push to GHCR
        id: push
        env:
          GHCR: ghcr.io/${{ inputs.image-name }}
          RELEASE_PUBLISH: ${{ inputs.publish && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')) }}
          PREVIEW_PUBLISH: ${{ inputs.publish-preview && inputs.preview-tag != '' }}
          PREVIEW_TAG: ${{ inputs.preview-tag }}
        run: |
          set -euo pipefail
          IMG=$(docker load -i image.tar.gz | sed -n 's/^Loaded image: //p' | head -1)
          if [ "$PREVIEW_PUBLISH" = "true" ]; then
            case "$PREVIEW_TAG" in
              ""|*[!A-Za-z0-9_.-]*)
                echo "::error::Preview tag must contain only letters, numbers, underscores, periods, and dashes."
                exit 1
                ;;
            esac
          fi
          echo "${{ github.token }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          docker tag "$IMG" "$GHCR:${{ github.sha }}"
          docker push "$GHCR:${{ github.sha }}"
          if [ "$RELEASE_PUBLISH" = "true" ]; then
            docker tag "$IMG" "$GHCR:latest"
            docker push "$GHCR:latest"
          fi
          if [ "$PREVIEW_PUBLISH" = "true" ]; then
            docker tag "$IMG" "$GHCR:$PREVIEW_TAG"
            docker push "$GHCR:$PREVIEW_TAG"
          fi
          echo "digest=$(docker inspect --format='{{index .RepoDigests 0}}' "$GHCR:${{ github.sha }}" | cut -d@ -f2)" >> "$GITHUB_OUTPUT"

      - name: Generate SBOM
        run: nix develop -c syft "ghcr.io/${{ inputs.image-name }}@${{ steps.push.outputs.digest }}" -o spdx-json=sbom.spdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: sbom
          path: sbom.spdx.json

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v4.1.0
        with:
          subject-name: ghcr.io/${{ inputs.image-name }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
